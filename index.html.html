<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Control - Horno</title>

<style>
  body {
    background: #1a1a1a;
    color: #ff6600;
    font-family: monospace;
    text-align: center;
    margin-top: 50px;
  }

  .pantalla {
    font-size: 2em;
    letter-spacing: 10px;
    margin-bottom: 20px;
    border: 2px solid #ff6600;
    display: inline-block;
    padding: 10px 20px;
  }

  .teclado {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 10px;
    justify-content: center;
  }

  button {
    font-size: 1.5em;
    padding: 20px;
    background: black;
    color: #ff6600;
    border: 2px solid #ff6600;
    cursor: pointer;
  }

  button:hover {
    background: #ff6600;
    color: black;
  }

  #mensaje {
    margin-top: 20px;
    font-size: 1.2em;
  }

  #secreto {
    display: none;
    margin-top: 30px;
    color: #00ffff;
  }
</style>
</head>

<body>

<h1>🔥 PANEL DE CONTROL DEL HORNO</h1>
<p>⚠️ Error crítico detectado</p>
<p>Ingrese el código para estabilizar el CORE</p>

<div class="pantalla" id="display">----</div>

<div class="teclado">
  <button onclick="agregar('1')">1</button>
  <button onclick="agregar('2')">2</button>
  <button onclick="agregar('3')">3</button>
  <button onclick="agregar('4')">4</button>
  <button onclick="agregar('5')">5</button>
  <button onclick="agregar('6')">6</button>
  <button onclick="agregar('7')">7</button>
  <button onclick="agregar('8')">8</button>
  <button onclick="agregar('9')">9</button>
  <button onclick="borrar()">←</button>
  <button onclick="agregar('0')">0</button>
  <button onclick="verificar()">✔</button>
</div>

<div id="mensaje"></div>

<div id="secreto">
  <h2>🔥 CORE ESTABILIZADO</h2>
  <p>Temperatura regresando a niveles seguros...</p>
  <p>Sistema restaurado. Acceso a la siguiente fase habilitado.</p>
</div>

<script>
let codigo = "";
const correcto = "0731";

function agregar(num) {
  if (codigo.length < 4) {
    codigo += num;
    actualizar();
  }
}

function borrar() {
  codigo = codigo.slice(0, -1);
  actualizar();
}

function actualizar() {
  document.getElementById("display").textContent =
    codigo.padEnd(4, "-");
}

function verificar() {
  if (codigo === correcto) {
    document.getElementById("mensaje").textContent = "✔ Estabilización completada";
    document.getElementById("secreto").style.display = "block";
  } else {
    document.getElementById("mensaje").textContent = "✖ Código inválido";
    codigo = "";
    actualizar();
  }
}
</script>

</body>
</html>
